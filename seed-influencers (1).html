chase prices, and build a multi-route distribution business is essential for anyone entering the route business space.","wiki":null,"yt":"https://www.youtube.com/@RouteBizPros","ig":null,"li":null,"tk":null,"web":"https://routebizpros.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":556,"name":"Route Advisors","handle":"@RouteAdvisors","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#2a5c00","initials":"RA","followers":"30K community","cred":"Route Business Broker & Advisor","extra":"Buy & Sell Distribution Routes","summary":"Route Advisors is a brokerage and education platform specializing in the buying and selling of distribution route businesses — including Pepperidge Farm, Flowers Bread, Wise Snacks, Frito-Lay, and other DSD route opportunities. Their guides on route valuation (typically priced at 1–2x annual net profit), due diligence checklists, financing options, and what to watch out for in route contracts provide the clearest roadmap available for first-time route buyers.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://routeadvisors.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":557,"name":"Bread Route Business (Flowers Foods / Nature's Own)","handle":"@BreadRoutes","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#f5c518","initials":"BR","followers":"15K community","cred":"Independent Distributor — Bread Routes","extra":"Flowers Foods & Sara Lee Distribution","summary":"Bread route businesses — particularly Flowers Foods (Nature's Own, Wonder Bread, Tastykake) independent distributor routes — are among the most established and predictable route business models available. Independent distributors purchase an exclusive territory, buy product from Flowers at wholesale, and sell to grocery stores, convenience stores, and food service accounts at retail prices. Understanding route pricing (typically $50K–$300K), account mix, seasonal patterns, and what makes a bread route defensible is essential for serious buyers.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://flowers.com/distributor-opportunities","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":558,"name":"Frito-Lay / PepsiCo Route Business (DSD Education)","handle":"@FritoLayRoutes","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#0070c0","initials":"FR","followers":"20K community","cred":"Chip & Snack Distribution Routes","extra":"Frito-Lay Independent Distributor","summary":"Frito-Lay and PepsiCo snack distribution routes represent some of the most profitable DSD (Direct Store Delivery) route businesses available — with established brand recognition, high product velocity, and proven retail relationships. Independent distributors manage their own territories, vehicles, and store relationships. Understanding how Frito-Lay route prices are calculated, what EBIDTA multiples are typical, how corporate route buybacks work, and how to negotiate with the parent company are critical skills for chip route buyers.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://fritolay.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":559,"name":"Snap-on Tools Franchise (Route Business Model)","handle":"@SnaponTools","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#cc0000","initials":"ST","followers":"3K+ franchisees","cred":"Mobile Tool Distribution Franchise","extra":"#1 Professional Tool Brand","summary":"Snap-on Tools franchisees operate mobile tool stores — driving customized trucks directly to automotive shops, dealerships, and industrial facilities to sell professional-grade tools on credit to technicians. The Snap-on franchise is one of the most successful mobile route businesses in the US, with franchisees typically generating $500K–$1.5M in annual sales. Understanding the credit/collections model, truck inventory management, and customer relationship building on a weekly route is essential for evaluating this franchise opportunity.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://snapon.com/franchise","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":560,"name":"Vending Business School (Stacy Tuschl / Industry)","handle":"@VendingBizSchool","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a1a3a","initials":"VB","followers":"100K YT","cred":"Vending Machine Business Education","extra":"Location Sourcing & Machine Operations","summary":"Vending Business School and the broader vending education community teach the fundamentals of building a profitable vending machine business — covering machine types (snack, beverage, combo, micro-market), location sourcing strategies, pricing, product selection, service frequency, and scaling from a few machines to a full route. Key metrics covered include cost per machine ($1,500–$10,000), revenue per location ($200–$2,000/month), and how to build route density to make service stops efficient.","wiki":null,"yt":"https://www.youtube.com/@VendingBusinessSchool","ig":null,"li":null,"tk":null,"web":"https://vendingbusinessschool.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":561,"name":"The Vending Insider","handle":"@VendingInsider","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a4d60","initials":"VI","followers":"60K YT","cred":"Vending Machine Business Operator","extra":"Real Numbers & Route Building","summary":"The Vending Insider documents the real-world journey of building a vending machine business — sharing actual machine revenue, location contracts, service costs, and the operational realities of growing a vending route. Their transparent breakdowns of which machine types and locations perform best, how to negotiate placement agreements with property managers, and how to handle machine repairs and restocking provide the most honest education available for aspiring vending entrepreneurs.","wiki":null,"yt":"https://www.youtube.com/@TheVendingInsider","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":562,"name":"Passive Vending (Aaron Noonan)","handle":"@PassiveVending","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#0f3d2e","initials":"PV","followers":"80K YT","cred":"Vending Business Scaling","extra":"Semi-Passive Income Strategy","summary":"Aaron Noonan of Passive Vending teaches how to build a vending machine business designed for semi-passive income — focusing on high-volume locations, hiring route drivers, and building systems that reduce owner involvement. His content on micro-market installations (open-shelf cooler systems replacing traditional vending machines), healthy snack vending, and how to evaluate whether a location has enough foot traffic to justify a machine placement is widely followed by entrepreneurs entering the vending space.","wiki":null,"yt":"https://www.youtube.com/@PassiveVending","ig":null,"li":null,"tk":null,"web":"https://passivevending.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":563,"name":"ATM Business Association (ATMIA)","handle":"@ATMIA","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3260","initials":"AT","followers":"10K+ members","cred":"ATM Industry Association","extra":"ATM Deployment & Operations","summary":"ATMIA (ATM Industry Association) is the global trade organization for the ATM industry — providing education, compliance resources, and business development tools for independent ATM deployers (IADs). Their resources on how to start an ATM business, how surcharge revenue works, cash loading logistics, machine procurement, and the regulatory environment are essential for entrepreneurs evaluating ATM placement as a business. Independent ATM operators typically earn $150–$400 per machine per month in surcharge revenue.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://atmia.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":564,"name":"ATM Business Blueprint","handle":"@ATMBizBlueprint","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#2a1a5c","initials":"AB","followers":"50K YT","cred":"ATM Business Education","extra":"Location Strategy & Cash Management","summary":"ATM Business Blueprint teaches the fundamentals of starting and scaling an independent ATM deployment business — covering machine procurement ($2,000–$8,000 per unit), location types (bars, convenience stores, event venues, dispensaries), surcharge fee structures, cash loading operations, armored car vs. owner-loading economics, and the compliance requirements around Bank Secrecy Act and AML regulations. Their content on multi-machine route building and achieving $5K–$20K/month in passive surcharge income is the most comprehensive free ATM business education available.","wiki":null,"yt":"https://www.youtube.com/@ATMBusinessBlueprint","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":565,"name":"Ice Vending Business (Twice the Ice / Kooler Ice)","handle":"@IceVending","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#00575e","initials":"IV","followers":"5K+ operators","cred":"Ice Vending Machine Business","extra":"Outdoor Automated Ice & Water","summary":"Ice vending machines (standalone outdoor units that produce and sell bagged ice and purified water) are one of the fastest-growing unattended retail businesses — with machines generating $2,000–$8,000/month in revenue and requiring minimal labor. Leading manufacturers include Twice the Ice and Kooler Ice. Understanding site selection (gas stations, grocery stores, parks), machine costs ($40,000–$80,000), financing options, and the maintenance requirements of ice vending equipment is essential for investors evaluating this route-adjacent business model.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://twicetheice.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":566,"name":"Juice & Beverage Route Business (Organic Valley / Tropicana DSD)","handle":"@JuiceRoutes","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#e07b00","initials":"JR","followers":"10K community","cred":"Beverage Distribution Routes","extra":"DSD Juice & Drink Routes","summary":"Juice and beverage distribution routes — including Tropicana, Naked Juice, and independent cold-pressed juice brands — operate on the DSD (Direct Store Delivery) model where distributors own territories and manage their own accounts. Beverage routes require refrigerated vehicles and frequent service cycles but benefit from high product velocity and multiple retailer categories. Key considerations include perishable inventory management, cold chain logistics, account churn, and how to evaluate a beverage route's defensibility when the parent brand changes distribution strategy.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://pepsicobeveragefacts.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":568,"name":"Box Truck Business Academy","handle":"@BoxTruckBiz","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#3d1a00","initials":"BT","followers":"120K YT","cred":"Box Truck Business Education","extra":"Hotshot, Moving & Delivery Routes","summary":"Box Truck Business Academy teaches entrepreneurs how to start and scale a box truck-based business — covering hotshot delivery, moving services, furniture delivery contracts with retailers like IKEA and Wayfair, Amazon relay loads, and government/B2B delivery contracts. Their content on vehicle selection (16ft vs 26ft trucks), DOT compliance, insurance requirements, and how to find consistent load volume without relying solely on load boards has helped thousands of owner-operators build sustainable box truck businesses.","wiki":null,"yt":"https://www.youtube.com/@BoxTruckBusinessAcademy","ig":null,"li":null,"tk":null,"web":"https://boxtruckbusinessacademy.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":569,"name":"Hotshot Trucking Secrets (Mark Lawr)","handle":"@HotshotSecrets","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a4d3a","initials":"HS","followers":"90K YT","cred":"Hotshot Trucking Educator","extra":"CDL-Exempt Small Load Hauling","summary":"Hotshot trucking — hauling time-sensitive freight in a pickup truck and gooseneck trailer — is one of the most accessible paths into owner-operator trucking, often requiring no CDL for loads under 26,000 GVWR. Mark Lawr and the hotshot trucking education community cover vehicle and trailer setups, how to find hotshot loads on DAT and Truckstop, fuel efficiency for hotshot rigs, insurance requirements, and how to build direct shipper relationships in oil & gas, construction, and agriculture.","wiki":null,"yt":"https://www.youtube.com/@HotshotTruckingSecrets","ig":null,"li":null,"tk":null,"web":"https://hotshottruckingsecrets.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":570,"name":"Delivery Entrepreneur (Courier & Final Mile)","handle":"@DeliveryEntrepreneur","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a1a4d","initials":"DE","followers":"40K YT","cred":"Courier & Final Mile Business","extra":"Local Delivery Contract Business","summary":"Delivery Entrepreneur covers the full range of last-mile and courier business models — from medical specimen transport and pharmaceutical delivery to legal document courier services and retail same-day delivery contracts. Their content on how to land delivery contracts with hospitals, law firms, and pharmacies, how to price courier services, and how to hire and manage a small driver fleet provides a roadmap for entrepreneurs building a local delivery business beyond the Amazon/FedEx contractor model.","wiki":null,"yt":"https://www.youtube.com/@DeliveryEntrepreneur","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":571,"name":"Snack Nation / Office Snack Route Business","handle":"@SnackRoutes","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#cc5500","initials":"SN","followers":"10K community","cred":"Office Snack & Micro-Market Distribution","extra":"Corporate Snack Delivery Routes","summary":"Office snack and micro-market delivery is a rapidly growing segment of the route distribution business — with companies like SnackNation, Canteen, and independent operators building recurring revenue by stocking corporate breakrooms, gym snack bars, and hotel sundry shops. Unlike traditional vending, micro-market operators install open-shelf systems with kiosks, allowing a wider product range and higher per-location revenue. Understanding account acquisition, product margin management, and theft/shrinkage in micro-markets is critical for operators in this space.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://snacknation.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":572,"name":"EV Charging Business (ChargePoint / Blink Education)","handle":"@EVChargingBiz","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#00a651","initials":"EV","followers":"20K community","cred":"EV Charging Station Business","extra":"Level 2 & DCFC Deployment","summary":"EV charging station deployment is an emerging route-adjacent business where entrepreneurs install and operate charging stations in commercial parking lots, apartment complexes, hotels, and retail centers — earning revenue per kilowatt-hour charged. Hardware providers like ChargePoint and Blink offer revenue-sharing and host-owned models. Key considerations include utility capacity, permitting, equipment costs ($3,000–$50,000+), network fees, and how to negotiate site host agreements that protect long-term revenue.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://chargepoint.com/business","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":573,"name":"Pool Route Business Education","handle":"@PoolRouteBiz","category":"home-services","cats":null,"subcategory":null,"badge":"Home Services","featured":false,"color":"#0077cc","initials":"PR","followers":"30K YT","cred":"Pool Service Route Business","extra":"Buy & Build Pool Routes","summary":"Pool service route businesses — where technicians service 80–150 residential or commercial pool accounts on a weekly route — are one of the most stable and scalable route business models in warm-weather markets. Routes are typically priced at 10–12x monthly billing (a $8,000/month route sells for $80,000–$96,000). Education covers route acquisition, chemical pricing, equipment repair revenue, hiring and training techs, and how to build a multi-technician route operation generating $500K–$2M in annual revenue.","wiki":null,"yt":"https://www.youtube.com/@PoolRouteBusiness","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":574,"name":"Lawn Care Route Business (Keith Kalfas / Mike Andes)","handle":"@LawnCareRoutes","category":"home-services","cats":null,"subcategory":null,"badge":"Home Services","featured":false,"color":"#2a5c00","initials":"LC","followers":"300K YT combined","cred":"Lawn & Landscape Route Business","extra":"Route Density & Recurring Revenue","summary":"Lawn care route businesses operate on the same DSD/route logic as product distribution — building geographic density, recurring weekly revenue, and systematic account management. Keith Kalfas and Mike Andes are the two most widely followed lawn care business educators, covering crew management, route optimization, pricing strategy, equipment selection, and scaling from solo operator to multi-crew business. Understanding route density (minimizing drive time between accounts) is the core profitability driver for lawn care operations.","wiki":null,"yt":"https://www.youtube.com/@keithkalfas","ig":null,"li":null,"tk":null,"web":"https://lawncaremillionaire.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":576,"name":"Retail Minded (Nicole Leinbach)","handle":"@RetailMinded","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#1a3260","initials":"RM","followers":"80K community","cred":"Independent Retailer Advocate","extra":"Retail Minded Magazine","summary":"Nicole Leinbach runs Retail Minded — the leading media brand for independent brick-and-mortar retailers. Her content covers merchandising, inventory management, customer experience, and the operational challenges facing small retail store owners competing against big-box and e-commerce. Essential reading for anyone opening or scaling an independent retail shop.","wiki":null,"yt":null,"ig":nul hant Method Founder","summary":"Chris Guillot of Merchant Method is one of the most respected retail merchandising educators — teaching independent store owners how to plan assortments, manage open-to-buy budgets, create compelling visual displays, and analyze sell-through data. His framework for retail buying and merchandise planning brings enterprise-level retail strategy to independent store owners who typically learn these skills by trial and error.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://merchantmethod.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":582,"name":"The Retail Transformation Show (Andrew Busby)","handle":"@RetailTransform","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#1a4d60","initials":"AB","followers":"40K listeners","cred":"Retail Innovation & CX Podcast","extra":"Future of Retail Trends","summary":"The Retail Transformation Show covers the future of retail — from AI-powered personalization and autonomous checkout to experiential retail and the death of the department store model. Andrew Busby's interviews with retail executives, technology vendors, and consumer behavior researchers provide independent retailers with forward-looking intelligence on where customer expectations and store formats are heading.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://retailtransformation.co.uk","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":583,"name":"Lightspeed Commerce (Retail POS Education)","handle":"@LightspeedHQ","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#ff4a00","initials":"LC","followers":"100K+ retailers","cred":"Retail POS & Analytics Platform","extra":"Inventory, CRM & Reporting","summary":"Lightspeed Commerce is a leading point-of-sale and retail management platform used by thousands of independent retailers across apparel, sporting goods, home goods, and specialty retail. Their educational content on inventory management, customer loyalty programs, omnichannel selling, and using POS data to make smarter buying decisions is directly applicable for any independent retailer looking to professionalize their back-office operations.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://lightspeedhq.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":584,"name":"NRF (National Retail Federation)","handle":"@NRFnews","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#003087","initials":"NR","followers":"35K+ members","cred":"World's Largest Retail Association","extra":"NRF Big Show & Research","summary":"The National Retail Federation is the world's largest retail trade association — producing annual research on consumer spending, loss prevention, workforce management, and retail technology. Their NRF Big Show conference and retail research reports provide independent retailers with benchmarking data on shrinkage rates, labor costs, profit margins by category, and the technology investments that correlate with stronger retail performance.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://nrf.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":585,"name":"Retail Obsessed (Alyssa Doyle)","handle":"@RetailObsessed","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#5c1a3a","initials":"AD","followers":"50K YT","cred":"Retail Career & Store Operations","extra":"Store Manager Training","summary":"Retail Obsessed covers the operational side of retail store management — training future store managers and current operators on scheduling, performance reviews, loss prevention, visual merchandising, and how to build a high-performing retail team. Her content bridges the gap between corporate retail training and the practical day-to-day skills independent store owners need to manage staff and drive consistent in-store execution.","wiki":null,"yt":"https://www.youtube.com/@RetailObsessed","ig":null,"li":null,"tk":null,"web":"https://retailobsessed.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":586,"name":"The Business of Fashion (BoF)","handle":"@BoF","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#1a1a1a","initials":"BF","followers":"300K readers","cred":"Fashion Retail Industry Media","extra":"Apparel & Luxury Retail Intelligence","summary":"Business of Fashion is the most authoritative media brand covering the fashion and apparel retail industry — from supply chain and sustainability to brand strategy and DTC retail. For apparel boutique owners, footwear retailers, and fashion entrepreneurs, BoF's analysis of consumer trends, wholesale vs. DTC trade-offs, and the economics of building a fashion brand provides essential competitive intelligence.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://businessoffashion.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":587,"name":"Americas Food & Beverage (Specialty Food Retail)","handle":"@SpecialtyFoodAssoc","category":"retail","cats":null,"subcategory":null,"badge":"Retail","featured":false,"color":"#2a5c00","initials":"SF","followers":"15K+ members","cred":"Specialty Food Retail Association","extra":"Fancy Food Show & Buyer Network","summary":"The Specialty Food Association serves specialty food retailers, artisan producers, and gourmet store owners — providing buyer-seller connections, trend research, and business education for the specialty food retail segment. Their Fancy Food Show is the premier trade event for specialty food discovery, and their resources on category management, store layout for food retail, and pricing premium food products are invaluable for independent grocery and specialty food store operat ach","extra":"The World's Okayest Mom Founder","summary":"Rachel Pedersen teaches social media managers and entrepreneurs how to use organic social media to generate leads and close sales without paid ads. Her content on building a social media management business, using TikTok and Instagram for client acquisition, and monetizing a social media following through direct offers is particularly useful for service-based entrepreneurs who want clients from content rather than cold outreach.","wiki":null,"yt":"https://www.youtube.com/@RachelPedersen","ig":null,"li":null,"tk":null,"web":"https://rachelpedersen.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":769,"name":"Route Consultants","handle":"@routeconsultants","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3d5c","initials":"RC","followers":"YouTube + Podcast + Community","cred":"FedEx ISP & Amazon DSP Route Business Advisors","extra":"Route Valuations, Buying & Selling Education","summary":"Route Consultants is the leading advisory and education platform for independent route business owners and buyers — specializing in FedEx Ground ISP routes, Amazon DSP programs, bread routes, and other distribution route businesses. Their team provides route valuations, brokerage services, and step-by-step coaching on buying, scaling, and selling route businesses. Essential for anyone entering the $10B+ independent distribution route market.","wiki":null,"yt":"https://youtube.com/@routeconsultants","ig":null,"li":null,"tk":null,"web":"https://routeconsultants.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":770,"name":"Linehaul News","handle":"@linehaul_news","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a2a3d","initials":"LN","followers":"Industry News & Analysis","cred":"Freight & Logistics Industry Publication","extra":"Linehaul, LTL & Truckload Market Coverage","summary":"Linehaul News is a dedicated industry news and analysis publication covering the linehaul trucking, LTL freight, and truckload markets — including carrier rate trends, driver pay, network changes at major carriers like FedEx, UPS, and Amazon, and independent contractor compliance. For route business investors, owner-operators, and DSP owners, Linehaul News provides essential current intelligence on the regulatory and market forces shaping the ground transportation and last-mile delivery sectors.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://linehaulnews.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":773,"name":"Truck N' Hustle / Rahmel Wattley","handle":"@trucknhustle","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3a1a","initials":"TH","followers":"#1 Trucking Podcast","cred":"Transportation Business & Culture Podcast","extra":"FreightFest Annual Conference","summary":"Truck N' Hustle, hosted by Rahmel Wattley, is the #1 trucking business and culture podcast — covering DSP ownership, last-mile delivery, box truck business, Amazon Relay, freight brokerage, and owner-operator journeys. Rahmel's interviews with operators who built 30+ truck fleets from single vans, young Amazon DSP owners, and last-mile entrepreneurs are among the most practical and community-driven resources in the delivery space. His annual FreightFest conference brings together thousands of transportation entrepreneurs for live education and networking.","wiki":null,"yt":"https://youtube.com/@TruckNHustle","ig":null,"li":null,"tk":null,"web":"https://trucknhustle.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":774,"name":"Spencer Patton / Route Consultant","handle":"@RouteConsultant","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#4a1a1a","initials":"SP","followers":"Largest FedEx Ground contractor (fmr.)","cred":"FedEx ISP Advisor & Route Marketplace","extra":"Annual Route Consultant Expo","summary":"Spencer Patton built Patton Logistics into the largest FedEx Ground ISP in the United States — operating 225 routes across 10 states — before becoming the most prominent public advocate for FedEx Ground contractors. His company Route Consultant brokers the sale of 1,000–2,500 FedEx and Amazon delivery routes per year, offers a 90-day contractor coaching program, and hosts an annual Route Consultant Expo attended by thousands of ISP owners. For anyone buying, selling, or operating FedEx Ground routes, Route Consultant is the most comprehensive education and brokerage resource available.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://routeconsultant.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":775,"name":"eTruckBiz / Jeff Walczak","handle":"@etruckbiz","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3d1a","initials":"ET","followers":"12+ yr FedEx Ground coaching platform","cred":"FedEx Ground ISP Business Coaching","extra":"Truck Talk Podcast | ISP Operations Blog","summary":"eTruckBiz, founded by Jeff Walczak, is the leading coaching, training, and consulting platform built exclusively for FedEx Ground ISP (Independent Service Provider) contractors. Their blog, Truck Talk podcast, and coaching programs cover ISP business structures, route profitability analysis, driver management, Network 2.0 compliance, contract negotiation, and scaling from a 5-route minimum to a multi-territory operation. For FedEx Ground contractors navigating the ISP model — including the shift to FedEx Network 2.0 — eTruckBiz is the most trusted independent advisory resource.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://etruckbizforfxg.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":776,"name":"CLDA / Customized Logistics & Delivery Association","handle":"@CLDAorg","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a2a3d","initials":"CL","followers":"Industry Trade Association","cred":"Final Mile & Last Mile Carrier Education","extra":"Annual Final Mile Forum & Expo","summary":"The Customized Logistics and Delivery Association (CLDA) is the premier trade organization for last-mile and final-mile delivery operators — representing independent couriers, regional carriers, DSPs, and white-glove delivery companies. Their annual Final Mile Forum & Expo in Las Vegas is the most important conference for last-mile business owners, covering technology adoption, contractor classification law, carrier diversification (Amazon, FedEx, regional shippers), and building a multi-client last-mile operation. Essential for anyone building beyond a single-carrier delivery business.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://clda.org","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":777,"name":"Last Mile Legend / Chris Bright","handle":"@lastmilelegend","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#3d1a3a","initials":"CB","followers":"Instagram + community following","cred":"Multi-Van Last Mile Fleet Owner","extra":"'Start Small End Big' — Last Mile Mentor","summary":"Chris Bright, known as Last Mile Legend on Instagram, built a multi-van last-mile delivery fleet by starting with a single box truck delivering Amazon packages at night while working his full-time job. His 'Start Small End Big' philosophy and community-focused approach — targeting 100 jobs created in his neighborhood — make him one of the most relatable mentors for aspiring delivery entrepreneurs. Featured on Blythe Brumleve's Everything Is Logistics and Truck N' Hustle, Chris coaches others on scaling from solo courier to fleet operator.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://digitaldispatch.io/starting-and-growing-a-last-mile-fleet-with-chris-bright","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":778,"name":"Everything is Logistics / Blythe Brumleve","handle":"@blythebrum","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3a2d","initials":"BB","followers":"Top supply chain influencer","cred":"Freight Marketing & Last Mile Podcast Host","extra":"Digital Dispatch — Freight Website Automation","summary":"Blythe Brumleve hosts Everything Is Logistics, one of the most respected podcasts in the freight and supply chain space, regularly covering last-mile delivery, DSP operations, Amazon logistics, and final-mile technology. Ranked as one of the top supply chain influencers, Blythe also runs Digital Dispatch, a marketing automation agency for freight companies. Her content bridges the gap between logistics operations and business growth — making her a must-follow for delivery entrepreneurs looking to build brands and scale their operations.","wiki":null,"yt":"https://youtube.com/@EverythingisLogistics","ig":null,"li":null,"tk":null,"web":"https://digitaldispatch.io","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":780,"name":"Amazon Relay (Official)","handle":"@AmazonRelay","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#e47911","initials":"AR","followers":"Middle-mile load board for carriers","cred":"Amazon Relay Freight Partner Program","extra":"RelayCon Annual Conference · Learning Center","summary":"Amazon Relay is Amazon's official middle-mile freight marketplace — connecting box truck operators, fleet owners, and owner-operators with Amazon's load board of spot freight, weekly contracts, and multi-month auction loads. Carriers earn $1.21–$3.09/mile with weekly payments, no broker fees, and free app-based booking. Amazon's annual RelayCon conference (600+ carriers in 2025) and Relay Learning Center provide free carrier training on safety, compliance, and rate optimization. For any box truck or semi owner looking to diversify income away from broker load boards, Amazon Relay is the most accessible high-volume freight program available.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://relay.amazon.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":781,"name":"KR Capital / FedEx Route Broker","handle":"@KRCapital","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#4a1a3a","initials":"KR","followers":"$400M+ in FedEx route sales · 13,000 buyer DB","cred":"Nation's Leading FedEx Route Brokerage","extra":"P&D · Linehaul · Buyer & Seller Resources","summary":"KR Capital is the nation's leading FedEx Ground route brokerage firm — exclusively facilitating the buy and sell of FedEx P&D (pickup/delivery) and linehaul routes for over 13 years. With $400M+ in total FedEx route sales, a proprietary database of 13,000+ active FedEx buyers, and a comprehensive library of buyer/seller education resources, KR Capital is the first stop for anyone evaluating a FedEx Ground route investment. Routes typically sell for 3–3.5x free cash flow (P&D) or 4x+ (linehaul), with annual profits of $30K–$40K per route scaling with every additional territory acquired.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://deliveryroutesforsale.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":782,"name":"Route Tycoon / Tony DiNitto","handle":"@RouteTycoon","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#2d1a3d","initials":"RT","followers":"FedEx & bread route due diligence expert","cred":"FedEx Ground + Route Business Consultant","extra":"1,000+ people consulted · Bloomberg, Reuters cited","summary":"Tony DiNitto is one of the most cited independent FedEx Ground and route business consultants in the country — quoted by Bloomberg, Reuters, FreightWaves, and Supply Chain Dive on the realities of route ownership economics. His site RouteTycoon.com offers proprietary due diligence training for anyone buying FedEx Ground, bread, chip, or DSD delivery routes. Having personally bought, sold, flipped, managed, and brokered across multiple route types over 10+ years, Tony is known for giving honest assessments of both the upside and the real risks of route businesses — an essential counterbalance to the hype-heavy content in the space.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://routetycoon.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":826,"name":"Patrick Bet-David","handle":"@patrickbetdavid","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#3d1a60","initials":"PB","followers":"5.1M YouTube","cred":"Valuetainment Founder · PHP Agency CEO","extra":"Built PHP from 66 to 20,000+ Agents","summary":"Patrick Bet-David is an Iranian-American entrepreneur who fled the revolution, served in the US Army, and built PHP Agency into one of the fastest-growing financial services companies in the country. His Valuetainment YouTube channel has become one of the most watched business education platforms in the world, featuring long-form interviews with entrepreneurs, politicians, and thought leaders alongside Patrick's own frameworks for building businesses and making decisions. His book Choose Your Enemies Wisely lays out his business philosophy. Patrick is known for his willingness to cover controversial topics in business and politics and is one of the most intellectually rigorous voices in entrepreneurship content.","wiki":null,"yt":"https://youtube.com/@valuetainment","ig":"https://instagram.com/patrickbetdavid","li":null,"tk":null,"web":"https://valuetainment.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":832,"name":"Iman Gadzhi","handle":"@imangadzhi","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#1a3a60","initials":"IG","followers":"1.8M YouTube","cred":"Agency Owner & Online Educator","extra":"Built $10M Agency by 21 · 35K+ Course Students","summary":"Iman Gadzhi is a London-born entrepreneur who dropped out of school at 17 to build a social media marketing agency that reached $10M in revenue by age 21. He now teaches agency building and online business through his courses and YouTube channel. His Agency Navigator program has enrolled over 35,000 students and is considered one of the most comprehensive SMMA training programs available. Iman's content covers client acquisition, service delivery systems, team building, and the mindset required to build an agency business from scratch. He is one of the most followed young entrepreneurship educators globally and is known for his high-production content and results-focused teaching style.","wiki":null,"yt":"https://youtube.com/@imangadzhi","ig":"https://instagram.com/imangadzhi","li":null,"tk":null,"web":"https://iamgadzhi.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":833,"name":"Simon Squibb","handle":"@simonsquibb","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#3a2a1a","initials":"SS","followers":"2.4M YouTube · 8.1M TikTok","cred":"Serial Entrepreneur · Investor · HelpBnk Founder","extra":"Built & Sold Multiple Companies · Gives Free Business Advice","summary":"Simon Squibb is a British serial entrepreneur who built and sold multiple companies before founding HelpBnk, a platform designed to connect aspiring entrepreneurs with mentors and funding. His viral TikTok and YouTube content features him giving spontaneous, honest business advice to strangers on the street, which has attracted a massive following. Simon's philosophy centers on giving generously — he offers free mentorship, free business ideas, and free funding consultations through his platform. His content is especially popular with young entrepreneurs from non-privileged backgrounds who feel locked out of traditional business education and funding networks.","wiki":null,"yt":"https://youtube.com/@simonsquibb","ig":"https://instagram.com/simonsquibb","li":null,"tk":"https://tiktok.com/@simonsquibb","web":"https://helpbnk.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":834,"name":"James Sinclair","handle":"@jamessinclair","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#1a3260","initials":"JS","followers":"560K YouTube","cred":"UK Entrepreneur · 9 Businesses · £30M+ Revenue","extra":"The Partyman Group Founder · Business Broadcast Podcast","summary":"James Sinclair is a British entrepreneur who built The Partyman Group, a collection of family entertainment centers, nurseries, and event venues generating over £30M in annual revenue. His YouTube channel, Business Broadcast, features honest, unfiltered content about running multiple businesses including the challenges of staff management, property acquisition, customer service, and scaling service businesses in the UK. James is known for his no-nonsense style and willingness to show the unglamorous reality of entrepreneurship alongside the wins. His content is especially valuable for entrepreneurs building physical, location-based businesses in service industries.","wiki":null,"yt":"https://youtube.com/@jamessinclair","ig":"https://instagram.com/mrjamessinclair","li":null,"tk":null,"web":"https://jamessinclair.net","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":836,"name":"Daniel Priestley","handle":"@danielpriestley","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#3d1a60","initials":"DP","followers":"400K YouTube","cred":"KPI Media Founder · Key Person of Influence Author","extra":"Scaled 3 Companies to $10M+ Across 3 Countries","summary":"Daniel Priestley is a British-Australian entrepreneur and author of Key Person of Influence, Oversubscribed, and entrepreneur revolution. He co-founded Dent Global, which runs entrepreneurship accelerators across the UK, US, and Australia. Daniel's content focuses on becoming a highly valued expert in your niche, building a business around personal authority, and creating products and services that attract clients rather than chasing them. His frameworks around being oversubscribed and building a personal brand as a business moat are highly practical for consultants, coaches, service providers, and agency owners looking to differentiate themselves in crowded markets.","wiki":null,"yt":"https://youtube.com/@danielpriestley","ig":null,"li":"https://linkedin.com/in/danielpriestley","tk":null,"web":"https://dent.global","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":837,"name":"Hormozi Business School / Alex Hormozi Clips","handle":"@hormozibusiness","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#c2410c","initials":"HB","followers":"520K YouTube","cred":"Acquisition.com Portfolio Operator","extra":"Companion Channel to Alex Hormozi Main","summary":"The Hormozi Business School channel aggregates and expands on Alex Hormozi's most impactful business frameworks with additional commentary, extended clips, and supplementary content for entrepreneurs who want to go deeper into the Acquisition.com philosophy. Content covers offer creation, sales conversion, operational scaling, and the financial mathematics behind building a highly profitable small business. The channel serves as a complement to Alex Hormozi's main channel and is especially useful for small business owners who want to apply Hormozi's principles to service businesses, brick-and-mortar operations, and local companies looking to increase revenue without increasing headcount.","wiki":null,"yt":"https://youtube.com/@hormozibusiness","ig":null,"li":null,"tk":null,"web":"https://acquisition.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":839,"name":"Colin and Samir","handle":"@colinandsamir","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#00575e","initials":"CS","followers":"1.3M YouTube","cred":"Creator Economy Analysts & Journalists","extra":"The Colin and Samir Show · Top Creator Business Podcast","summary":"Colin and Samir are two of the most respected analysts covering the creator economy and digital entrepreneurship. Their YouTube channel and podcast break down how top creators build businesses, monetize audiences, negotiate brand deals, and build media companies. They conduct long-form interviews with the world's biggest YouTubers, podcasters, and digital entrepreneurs, offering behind-the-scenes insight into the business models powering the creator economy. For entrepreneurs building businesses around content, personal brand, or media, Colin and Samir provide the most thorough and journalistic coverage of what works at scale in the modern attention economy.","wiki":null,"yt":"https://youtube.com/@colinandsamir","ig":"https://instagram.com/colinandsamir","li":null,"tk":null,"web":"https://colinandsamir.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":840,"name":"Guy Raz – How I Built This","handle":"@howibuiltthis","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneur les":null,"courseUrls":null}];

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '
';
  el.scrollTop = el.scrollHeight;
}

function setBar(pct) {
  document.getElementById('bar').style.width = pct + '%';
}

async function startSeed() {
  const url = document.getElementById('sbUrl').value.trim().replace(//+$/, '');
  const key = document.getElementById('sbKey').value.trim();
  if (!url || !key) { alert('Please enter Supabase URL and key.'); return; }
  
  // Save to localStorage for the directory
  localStorage.setItem('smb_cfg', JSON.stringify({sbUrl: url, sbKey: key, sbTable: 'profind_influencers'}));
  localStorage.setItem('smb_influencers', JSON.stringify(INFLUENCERS));
  
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  btn.textContent = 'Seeding…';
  
  const BATCH = 50;
  let success = 0, errors = 0;
  
  for (let i = 0; i < INFLUENCERS.length; i += BATCH) {
    const batch = INFLUENCERS.slice(i, i + BATCH);
    const rows = batch.map(inf => ({
      id: inf.id,
      name: inf.name,
      category: inf.category,
      data: inf
    }));
    
    try {
      const res = await fetch(url + '/rest/v1/profind_influencers', {
        method: 'POST',
        headers: {
          'apikey': key,
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify(rows)
      });
      
      if (res.ok || res.status === 201) {
        success += batch.length;
        log('✅ Batch ' + (i/BATCH+1) + ': rows ' + (i+1) + '–' + Math.min(i+BATCH, INFLUENCERS.length) + ' seeded');
      } else {
        const err = await res.text();
        errors += batch.length;
        log('❌ Batch ' + (i/BATCH+1) + ' error: ' + err.slice(0,100));
      }
    } catch(e) {
      errors += batch.length;
      log('❌ Network error: ' + e.message);
    }
    
    setBar(Math.round((i + BATCH) / INFLUENCERS.length * 100));
    await new Promise(r => setTimeout(r, 200)); // rate limit
  }
  
  setBar(100);
  log('
🎉 Done! ' + success + ' seeded, ' + errors + ' errors.');
  log('✅ Also saved to localStorage as backup.');
  btn.textContent = 'Seeding Complete ✅';
}
