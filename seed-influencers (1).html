y":null,"badge":"Sales","featured":false,"color":"#2d4a1a","initials":"KW","followers":"220K YT","cred":"Sales Scripts & Roleplay","extra":"YesMasters Sales Training","summary":"Kevin Ward built YesMasters as a real estate sales training platform, but his sales scripts, roleplay methodology, and objection-handling frameworks are directly transferable to any home service, franchise, or B2B service sale. His highly specific word-for-word scripts and intense roleplay focus produce fast results for salespeople who want to feel confident handling any objection. His approach to handling price objections is particularly valuable for home service businesses competing on value.","wiki":null,"yt":"https://www.youtube.com/@kevinwardnow","ig":null,"li":null,"tk":null,"web":"https://yesmasters.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":175,"name":"Gatlin McBride","handle":"@Gatlin.McBride","category":"home-services","cats":null,"subcategory":null,"badge":"Home Services","featured":false,"color":"#2a5c1a","initials":"GM","followers":"—","cred":"Mint Cleaning Founder","extra":"Cleaning Business Expert","summary":"Gatlin McBride is the founder of Mint Cleaning and a growing educator for cleaning business owners. His YouTube channel documents the real journey of building and scaling a professional cleaning company — covering client acquisition, pricing, hiring cleaners, and the systems that make a cleaning business run without the owner being on every job.","wiki":null,"yt":"https://www.youtube.com/@Gatlin.McBride","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":176,"name":"Mat Sorensen","handle":"@matsorensen","category":"finance-business","cats":null,"subcategory":null,"badge":"Business Finance","featured":false,"color":"#1a3a60","initials":"MS","followers":"150K YT","cred":"Self-Directed IRA Expert","extra":"KKOS Lawyers Founder","summary":"Mat Sorensen is an attorney, munity for Entrepreneurship Through Acquisition, connecting searchers, investors, advisors, and service providers in the SMB acquisition space. The platform hosts deal discussions, due diligence resources, investor directories, and one of the most active forums for people actively searching for small businesses to acquire. For anyone entering ETA, Searchfunder is the first community to join and the most valuable ongoing network in the space.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://searchfunder.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":183,"name":"SMB Twitter / X Community","handle":"@smbtwitter","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#1a3260","initials":"ST","followers":"10K+ active users","cred":"SMB Acquisition Community","extra":"X / Twitter Network","summary":"SMB Twitter (now X) is an informal but highly active community of small business acquirers, operators, and investors who share deal experiences, financial models, due diligence tips, and operator stories in real time. Key accounts include @samba_seid, @themfkid, @sweatystartup and dozens more. For anyone in ETA, being active in this community provides access to deal flow, investor introductions, co-investor networks, and the most candid operator conversations happening anywhere online.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://x.com/search?q=%23SMBTwitter","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":184,"name":"Sweaty Startup (Nick Huber)","handle":"@sweatystartup","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#3d4a00","initials":"NH","followers":"350K YT","cred":"SMB Acquisition & Ops","extra":"Self Storage Empire","summary":"Nick Huber built a storage business from scratch and has since acquired and operates dozens of small businesses across storage, real estate t for finding off-market and broker-listed opportunities. Their market data reports on business sale multiples, seller financing trends, and industry valuations are the most widely referenced benchmarks in the SMB acquisition community.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://bizbuysell.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":187,"name":"Ryan Walsh","handle":"@ryanwalshrepvue","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#1a4d2a","initials":"RW","followers":"50K+ LinkedIn","cred":"RepVue Founder & CEO","extra":"Sales Transparency Leader","summary":"Ryan Walsh is the Founder and CEO of RepVue, the leading platform for sales professionals to research and rate sales organizations — think Glassdoor specifically for sales teams. RepVue provides transparency into quota attainment rates, on-target earnings, culture, and leadership quality across thousands of companies. For sales professionals evaluating their next role and for sales leaders benchmarking their organizations, Ryan's work at RepVue and his content on sales culture, compensation, and career development is essential.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/ryanmwalsh/","tk":null,"web":"https://repvue.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":188,"name":"Elliott Holland","handle":"@elliottholland","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#1a3260","initials":"EH","followers":"1,500+ deals","cred":"Guardian Due Diligence Founder","extra":"Harvard MBA | 15 Yrs Deal Exp","summary":"Elliott Holland is the Founder and Managing Director of Guardian Due Diligence — the leading due diligence firm for ETA entrepreneurs and self-funded searchers acquiring small businesses. A Harvard MBA with 15+ years of deal experience across private equity, independent sponsorship, and self-funded search, Elliott founded Guardian in 2017 after recognizing that cost-effective, reliable due diligence for sub-M deals simply did not exist. Guardian has evaluated over 1,500 deals spanning 00M+ in transactions, and Elliott is one of the most trusted voices in the ETA community on Quality of Earnings, deal advisory, and avoiding costly acquisition mistakes.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/elliottholland/","tk":null,"web":"https://guardianduediligence.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":189,"name":"Ian Koniak","handle":"@iankoniak","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#0f3d2e","initials":"IK","followers":"150K+ LinkedIn","cred":"Former #1 Enterprise AE at Salesforce","extra":"Untap Your Sales Potential","summary":"Ian Koniak is the Founder and CEO of Untap Your Sales Potential, one of the fastest-growing sales coaching companies in America and the only sales training firm ranked on the 2025 Inc. 5000 list. A former #1 Enterprise Account Executive at Salesforce with over $100M in career sales and 16 quota-attainment years out of 19, Ian coaches B2B tech AEs to reach the top 1% by mastering mindset, habits, and enterprise selling skills. His coaching programs — private, group, and team — are the most reviewed in the industry, and he serves as Dean of Pavilion's Enterprise Sales School.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/iankoniak/","tk":null,"web":"https://iankoniak.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":190,"name":"Kevin O'Leary","handle":"@kevinolearytv","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#1a3260","initials":"KO","followers":"1.2M YT","cred":"Shark Tank Mr. Wonderful","extra":"O'Leary Ventures Chairman","summary":"Kevin O'Leary — known as Mr. Wonderful on Shark Tank — is one of the most recognized entrepreneur-investors in the world. He founded SoftKey International and sold it to Mattel for $3.7 billion, then went on to build O'Leary Ventures, O'Leary Funds, and Beanstox. With 5 Emmy wins from Shark Tank and a massive social media following across YouTube, X, Instagram, and TikTok, O'Leary delivers blunt, numbers-first business and investing advice to millions of aspiring entrepreneurs. His content covers startup investing, personal finance, small business strategy, and the realities of building wealth.","wiki":null,"yt":"https://www.youtube.com/@kevinoleary","ig":"https://www.instagram.com/kevinolearytv/","li":null,"tk":null,"web":"https://kevinoleary.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":191,"name":"Mark Cuban","handle":"@mcuban","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#0a3d62","initials":"MC","followers":"9M X followers","cred":"Shark Tank Investor","extra":"Cost Plus Drugs Founder","summary":"Mark Cuban is a serial entrepreneur and billionaire best known as a longtime investor on Shark Tank and former owner of the Dallas Mavericks NBA franchise. He made his fortune selling Broadcast.com to Yahoo for $5.7 billion in 1999 and has since invested in hundreds of startups. His most recent venture, Cost Plus Drugs, disrupts pharmaceutical pricing by publishing transparent costs on generic medications. Deeply active on social media — particularly X and TikTok — Cuban is one of the most accessible and outspoken billionaire voices on entrepreneurship, AI, competition, and the mindset required to build great companies.","wiki":"https://en.wikipedia.org/wiki/Mark_Cuban","yt":null,"ig":"https://www.instagram.com/mcuban/","li":null,"tk":"https://www.tiktok.com/@mcuban","web":"https://markcuban.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":192,"name":"Tim Ferriss","handle":"@tferriss","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3d2a","initials":"TF","followers":"1.6M YT · 1.9M X","cred":"4-Hour Workweek Author","extra":"Tim Ferriss Show Podcast","summary":"Tim Ferriss is the author of five #1 New York Times bestsellers including The 4-Hour Workweek, which introduced the concept of lifestyle design and remote work to a generation of entrepreneurs. His podcast, The Tim Ferriss Show, was the first business/interview podcast to surpass 100 million downloads and has now exceeded 1 billion. An early investor in Uber, Facebook, Shopify, and Duolingo, Ferriss deconstructs world-class performers across investing, sports, and business. His 3-2-1 newsletter reaches over 3 million subscribers weekly with frameworks for better thinking, habits, and entrepreneurship.","wiki":"https://en.wikipedia.org/wiki/Tim_Ferriss","yt":"https://www.youtube.com/@timferriss","ig":null,"li":null,"tk":null,"web":"https://tim.blog","bookTitles":"The 4-Hour Workweek,Tools of Titans","bookUrls":"https://www.amazon.com/dp/0307465357,https://www.amazon.com/dp/1328683788","courseTitles":null,"courseUrls":null},{"id":193,"name":"Vivian Tu (Your Rich BFF)","handle":"@yourrichbff","category":"finance-personal","cats":null,"subcategory":null,"badge":"Personal Finance","featured":false,"color":"#6b21a8","initials":"VT","followers":"2.7M TikTok · 4M IG","cred":"Ex-JPMorgan Wall Street Trader","extra":"NYT Bestselling Author","summary":"Vivian Tu — known as Your Rich BFF — is a former JPMorgan equities trader turned personal finance content creator with over 10 million followers across platforms. She quit a $600K+ salary role to build her brand, which has since become one of the most influential voices in millennial and Gen Z personal finance. Her content demystifies investing, budgeting, salary negotiation, and wealth-building without the dry finance-bro tone. She is a TIME 100 Creator, Chief of Financial Empowerment at SoFi, and author of the NYT bestseller Rich AF. Her newsletter Networth & Chill has hundreds of thousands of listeners.","wiki":null,"yt":null,"ig":"https://www.instagram.com/your.richbff/","li":null,"tk":"https://www.tiktok.com/@yourrichbff","web":"https://yourrichbff.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":194,"name":"Morgan Ingram","handle":"@morganjingram","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#1a4d3a","initials":"MI","followers":"100K+ LinkedIn","cred":"CEO of AMP Social","extra":"4x LinkedIn Top Sales Voice","summary":"Morgan J. Ingram started as the worst-performing SDR on his team in 2016 and turned that around to become one of the most recognized sales voices on LinkedIn — named a Top Sales Voice four times. As CEO of AMP Social, he trains B2B sales teams at companies like HubSpot, Snowflake, and Salesforce on multi-channel outbound using intent signals, LinkedIn prospecting, and human-first outreach. He is the creator of the SDR Chronicles video series, which documented his early career struggles and built a massive following of sales professionals seeking practical, executable tactics for booking more meetings.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/morganjingramamp/","tk":null,"web":"https://ampsocial.io","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":195,"name":"Josh Braun","handle":"@joshbraun","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#3d1a4d","initials":"JB","followers":"190K+ LinkedIn","cred":"Founder of Josh Braun Sales","extra":"Cold Email & Prospecting Expert","summary":"Josh Braun is one of the most followed independent sales voices on LinkedIn, known for his philosophy of selling without pressure, manipulation, or commission breath. His content focuses on cold email psychology, detachment from outcomes, and human-centered prospecting — covering how to write subject lines that work, openers that lower guards, and follow-ups that respect the buyer's autonomy. He runs the Inside Selling podcast and has created the Badass B2B Growth Guide, a widely-used resource for SDRs and AEs looking to book more meetings without feeling sleazy.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/josh-braun/","tk":null,"web":"https://joshbraun.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":196,"name":"Armand Farrokh & Nick Cegelski","handle":"@30mpc","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#1a2a4d","initials":"AF","followers":"#1 Sales Podcast","cred":"30 Minutes to President's Club","extra":"Cold Calling Sucks Bestselling Authors","summary":"Armand Farrokh and Nick Cegelski are the co-hosts of 30 Minutes to President's Club — ranked the #1 sales podcast in the world — and co-authors of the international bestseller Cold Calling Sucks (And That's Why It Works), which has sold over 50,000 copies. Armand was VP of Sales at Pave, scaling revenue from $0 to $13M+ ARR and becoming VP at just 29. Nick is a 3x top enterprise seller. Together they cut through fluffy mindset content to deliver hyper-actionable tactics on cold calling, discovery, pipeline management, and sales leadership — used by reps at Salesforce, Gong, Outreach, and hundreds of other top companies.","wiki":null,"yt":"https://www.youtube.com/@30mpc","ig":null,"li":null,"tk":null,"web":"https://www.30mpc.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":197,"name":"Belal Batrawy","handle":"@belbatrawy","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#4d1a1a","initials":"BB","followers":"60K+ LinkedIn","cred":"Founder of Death to Fluff","extra":"Salesforce & Gartner Top Sales Voice","summary":"Belal Batrawy is the founder of Death to Fluff — a movement and newsletter dedicated to eliminating vague, manipulative, and ineffective sales advice. With 15 years in SaaS sales as an early hire at 7 startups across 2 IPOs and 3 acquisitions, Belal has made over $15 million in sales himself. He is recognized as a top sales thought leader by Salesforce, Gartner, LinkedIn, Business Insider, and Crunchbase. His content focuses on the psychology of selling — provocative messaging, the Mic Drop Method for cold calling, and using emotional impact before rational ROI — all delivered with zero fluff.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/belbatrawy/","tk":null,"web":"https://deathtofluff.substack.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":198,"name":"Alex Bridgeman","handle":"@AlexCBridgeman","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#2a1a5c","initials":"AB","followers":"200+ Episodes","cred":"Thinking Like an Owner Podcast","extra":"ETA & CEO Interviewer","summary":"Alex Bridgeman is the host of Thinking Like an Owner, one of the most respected podcasts in the ETA and SMB acquisition community. Started in 2018, the show focuses on how the most ambitious CEOs grow and operate great businesses — covering acquisition stories, search fund experiences, operating frameworks, and the mindset shifts required to succeed as an owner-operator. Alex has published 200+ episodes interviewing searchers, ETA investors, and business owners, and is widely followed by the ETA community on Twitter and LinkedIn for his concise, high-signal takes on deal-making, due diligence, and business building.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://tlaopodcast.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":199,"name":"James Clear","handle":"@JamesClear","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#1a4d1a","initials":"JC","followers":"2M IG · 3M+ Newsletter","cred":"Atomic Habits Author","extra":"25M+ Books Sold","summary":"James Clear is the author of Atomic Habits — the #1 New York Times bestseller that has sold over 25 million copies and been translated into 60+ languages. His work on habits, decision-making, and continuous improvement has become foundational reading for entrepreneurs, executives, and athletes worldwide. His weekly 3-2-1 newsletter reaches over 3 million subscribers with three ideas, two quotes, and one question designed to help people build better systems. Clear argues that small daily improvements compound into remarkable results — a principle entrepreneurs apply to sales habits, business systems, and personal productivity.","wiki":"https://en.wikipedia.org/wiki/James_Clear","yt":null,"ig":"https://www.instagram.com/jamesclear/","li":null,"tk":null,"web":"https://jamesclear.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":200,"name":"Alex Cattoni","handle":"@AlexCattoni","category":"marketing","cats":null,"subcategory":null,"badge":"Marketing","featured":false,"color":"#5c1a3a","initials":"AC","followers":"400K+ YT","cred":"Founder of Copy Posse","extra":"2022 DigitalMarketer of the Year","summary":"Alex Cattoni is the founder of Copy Posse and one of the most respected copywriting educators on YouTube, with 400K+ subscribers built entirely through organic content with no paid ads. A former multi-six-figure copywriter for top transformational brands, she launched her channel in 2019 to teach ethical, human-centered marketing and messaging. She was named 2022 Marketer of the Year by DigitalMarketer, voted #1 most popular copywriter in 2023, and received the Game Changer Award at the Women of Inspiration Awards in 2024. Her content covers sales page writing, email sequences, brand voice, and the psychology of persuasion.","wiki":null,"yt":"https://www.youtube.com/@copyposse","ig":"https://www.instagram.com/copyposse/","li":null,"tk":null,"web":"https://alexcattoni.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":201,"name":"Harry Dry","handle":"@harrydry","category":"marketing","cats":null,"subcategory":null,"badge":"Marketing","featured":false,"color":"#1a3d4d","initials":"HD","followers":"130K Newsletter · 53K LinkedIn","cred":"Founder of Marketing Examples","extra":"The Copywriter's Copywriter","summary":"Harry Dry is the founder of Marketing Examples — a newsletter and website with 130,000+ subscribers that breaks down the marketing and copywriting strategies behind the world's most effective brands. Built entirely organically from scratch with no paid ads or existing audience, Marketing Examples is a cult resource for marketers, founders, and copywriters who want concise, actionable case studies they can steal and deploy. Harry's weekly format — three short examples, two copywriting tips, one favorite tweet — has become a model for newsletter creators. His content is beloved for turning abstract marketing principles into vivid, concrete language that sticks.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://marketingexamples.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":202,"name":"Bedros Keuilian","handle":"@bedroskeuilian","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#3d1a0f","initials":"BK","followers":"600K YT · 944K IG","cred":"Founder of Fit Body Boot Camp","extra":"Author: Man Up (WSJ Bestseller)","summary":"Bedros Keuilian is a serial entrepreneur, author, and speaker who immigrated from Soviet Armenia as a child and went on to build Fit Body Boot Camp into one of America's fastest-growing fitness franchise systems with 800+ locations. His story — from section 8 housing to multi-figure entrepreneurship — forms the backbone of his raw, no-BS content on business mindset, leadership, discipline, and building high-performance teams. Bedros has appeared on Spike TV's Gym Rescue, authored the WSJ bestselling book Man Up, and has coached thousands of business owners worldwide. His YouTube channel and social content are especially popular among aspiring franchise owners, brick-and-mortar operators, and entrepreneurs who want direct talk about building a business around identity and mission.","wiki":null,"yt":"https://www.youtube.com/@BedrosKeuilian","ig":"https://www.instagram.com/bedroskeuilian/","li":null,"tk":null,"web":"https://bedroskeuilian.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":203,"name":"My First Million Pod","handle":"@myfirstmillion","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#2d1a45","initials":"MF","followers":"1M+ YT · 1.5M Spotify","cred":"#1 Entrepreneurship Podcast","extra":"Hosted by Shaan Puri & Sam Parr","summary":"My First Million is the podcast where Shaan Puri and Sam Parr brainstorm business ideas in real time — featuring deep-dives into billion-dollar market opportunities, under-the-radar niches, side hustle success stories, and the frameworks behind successful startup pivots. Beyond Shaan Puri's individual presence in SMB ProFind, the show itself is a distinct resource: it features interviews with founders and operators across industries, breaking down how ordinary people built extraordinary companies. The show is particularly strong for entrepreneurs hunting for new business ideas, evaluating markets, or trying to think like a dealmaker. With over 400 episodes and a massive community, MFM is essential listening for anyone who wants to sharpen their entrepreneurial eye.","wiki":null,"yt":"https://www.youtube.com/@MyFirstMillionPod","ig":null,"li":null,"tk":null,"web":"https://www.mfmpod.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":204,"name":"Reid Hoffman","handle":"@reidhoffman","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a2d4d","initials":"RH","followers":"32M LinkedIn Connections · Masters of Scale Podcast","cred":"Co-Founder of LinkedIn","extra":"Partner at Greylock · Author","summary":"Reid Hoffman is the co-founder of LinkedIn, a partner at Greylock Partners, and one of Silicon Valley's most influential startup thinkers. He was an early investor and board member at companies including PayPal, Facebook, Airbnb, and Convoy. He is the founding host of Masters of Scale — a top-ranked business podcast featuring candid conversations with founders like Brian Chesky, Reed Hastings, and Dara Khosrowshahi about how companies scale from great ideas to global institutions. The show has won 32 industry nominations including Webby Awards and has expanded into events, a book, and a learning platform. Reid's content is especially valuable for startup founders, investors, and entrepreneurs thinking about network effects, product-market fit, and scaling strategies.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/reidhoffman/","tk":null,"web":"https://mastersofscale.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":205,"name":"Kara Goldin","handle":"@karagoldin","category":"entrepreneurship","cats":null,"subcategory":null,"badge":"Entrepreneurship","featured":false,"color":"#2d3d1a","initials":"KG","followers":"The Kara Goldin Show Podcast","cred":"Founder of Hint Water · $220M Brand","extra":"WSJ Bestselling Author: Undaunted","summary":"Kara Goldin is the founder of Hint Inc., the leading unsweetened flavored water brand now stocked in 30,000 stores across the U.S. A former AOL executive, she started Hint from her kitchen after cutting diet soda for health reasons and grew it into a $220M brand without a single day of formal beverage industry experience. Named to Fortune's Most Powerful Women Entrepreneurs, Fast Company's Most Creative People in Business, and EY Entrepreneur of the Year, Kara is a compelling voice for product entrepreneurs, especially female founders. Her WSJ bestselling memoir Undaunted shares the unfiltered story of building Hint against constant rejection. Her daily podcast The Kara Goldin Show features unfiltered conversations with bold entrepreneurs, leaders, and disruptors across all industries.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/karagoldin/","tk":null,"web":"https://karagoldin.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":206,"name":"Liz Leonard","handle":"@lizleonardfranchise","category":"franchise","cats":null,"subcategory":null,"badge":"Franchise","featured":false,"color":"#1a4030","initials":"LL","followers":"Growing TikTok & LinkedIn","cred":"FranServe Franchise Advisor","extra":"Author: Franchise Guidebook","summary":"Liz Leonard is a franchise advisor and educator affiliated with FranServe — the world's largest franchise consulting organization — who has built an audience around demystifying franchise ownership for corporate professionals and aspiring entrepreneurs. She is the author of a comprehensive franchise guidebook designed to help first-time buyers navigate the industry confidently. Her social content across TikTok and LinkedIn covers franchise discovery, the consulting process, FDD basics, and how to evaluate opportunities before investing. As a practitioner-educator with a client-first approach, Liz is increasingly visible as a trusted voice for people considering the transition from employee to franchise owner.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/lizaleonard/","tk":null,"web":"https://lizleonardfranchiseadvisor.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":207,"name":"Eddy Goldberg","handle":"@franchiseupdate","category":"franchise","cats":null,"subcategory":null,"badge":"Franchise","featured":false,"color":"#1d2d3d","initials":"EG","followers":"Franchise Update Magazine","cred":"Managing Editor, Franchise Update Media","extra":"30+ Years Franchise Journalism","summary":"Eddy Goldberg is a senior editor and journalist at Franchise Update Media Group — the publisher of Franchise Update Magazine and Multi-Unit Franchisee Magazine, two of the franchise industry's most authoritative publications. With more than 30 years covering franchising, Goldberg has written extensively on franchise growth strategy, multi-unit operations, marketing, and technology — giving him a front-row seat to every major franchise trend of the last three decades. While not a social influencer in the traditional sense, Eddy is a go-to editorial voice for franchisors, multi-unit operators, and anyone serious about understanding the franchise industry from an operator's perspective.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://www.franchising.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":208,"name":"Jamal Reimer","handle":"@jamal_reimer","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#2d1a3d","initials":"JR","followers":"50K+ LinkedIn","cred":"Former #1 Enterprise AE at Salesforce","extra":"$100M+ Career Sales · Mega Deal Coach","summary":"Jamal Reimer is the definitive voice on enterprise mega deals — a former #1 Enterprise Account Executive at Salesforce who has accumulated over $100 million in career sales and now coaches AEs and sales leaders on how to pursue, structure, and close the largest deals of their careers. His Mega Deal Secrets coaching program and Enterprise Sellers community help ambitious sellers think bigger, navigate complex stakeholder environments, and close deals that are 5–10x their average size. Jamal is also the Dean of Pavilion's Enterprise Sales School and has been featured in Forbes. His LinkedIn content is uniquely focused on the upper tiers of enterprise selling — navigating C-suite dynamics, managing internal champions, and thinking like a field marshal across large cross-functional deal teams.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/jamal-reimer/","tk":null,"web":"https://www.enterprisesellers.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":209,"name":"Kyle Coleman","handle":"@kyletcoleman","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#1a2d1a","initials":"KC","followers":"130K+ LinkedIn","cred":"CMO at Copy.ai · Former CMO at Clari","extra":"Looker Employee #6 → Clari → Copy.ai","summary":"Kyle Coleman is a GTM leader and LinkedIn Top Voice who started as an SDR in 2013 and became CMO of Copy.ai — the first GTM AI Platform — after scaling Clari nearly 10x in ARR as their CMO. He is one of the most respected voices at the intersection of sales and marketing, especially on AI-powered GTM strategy, SDR enablement, and how modern B2B teams should structure their outbound and content motions. His LinkedIn content is highly actionable and grounded in real experience: account-based marketing, AI workflows for pipeline generation, and helping sellers understand the modern buyer. Kyle's trajectory from entry-level SDR to CMO gives him rare credibility to speak authentically to both individual contributors and revenue leaders.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/kyletcoleman/","tk":null,"web":"https://www.copy.ai","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":210,"name":"Keenan","handle":"@jimkeenan","category":"sales","cats":null,"subcategory":null,"badge":"Sales","featured":false,"color":"#3d2d1a","initials":"KN","followers":"300K+ LinkedIn","cred":"CEO of A Sales Growth Company","extra":"Author: Gap Selling","summary":"Keenan is the CEO of A Sales Growth Company, a prolific writer and content creator, and the author of Gap Selling — one of the most influential sales books of the past decade. His core philosophy: salespeople fail not because of poor closing tactics, but because they don't understand the buyer's problem deeply enough. Gap Selling reframes the entire sales process around problem identification, root cause analysis, and the gap between the buyer's current state and future state. Keenan's LinkedIn presence is combative, opinionated, and incredibly popular — he regularly streams live sales debates, calls out outdated orthodoxies, and pushes reps to raise their sales IQ. His content is especially popular with AEs, SDRs, and revenue leaders who want a more disciplined, buyer-centered approach to discovery.","wiki":null,"yt":null,"ig":null,"li":"https://www.linkedin.com/in/jimkeenan","tk":null,"web":"https://salesgrowth.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":211,"name":"Dickie Bush","handle":"@dickiebush","category":"marketing","cats":null,"subcategory":null,"badge":"Marketing","featured":false,"color":"#1a3040","initials":"DB","followers":"400K+ X/Twitter","cred":"Co-Creator of Ship 30 for 30","extra":"Former BlackRock Hedge Fund Trader","summary":"Dickie Bush is the co-creator of Ship 30 for 30 — the most popular digital writing course on the internet — and one of the most watched growth stories in the creator economy. A former Princeton-educated hedge fund trader at BlackRock, Dickie left finance to build an audience from zero on Twitter by writing one short essay every day for 30 days. That experiment spawned a movement: Ship 30 for 30 has now served tens of thousands of students who commit to writing 30 atomic essays in 30 days to build writing habits, grow audiences, and launch online businesses. Alongside co-creator Nicolas Cole, Dickie has built a multi-million dollar writing education platform. For marketers, founders, and creators, his content on audience growth, consistent publishing, and building in public is some of the most practical available anywhere.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://www.ship30for30.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":212,"name":"Lenny Rachitsky","handle":"@lennysan","category":"marketing","cats":null,"subcategory":null,"badge":"Marketing","featured":false,"color":"#2d1a40","initials":"LR","followers":"1M+ Newsletter Subscribers · Top Substack","cred":"Former Product Lead at Airbnb","extra":"#1 Business Newsletter on Substack","summary":"Lenny Rachitsky is the author of Lenny's Newsletter and host of Lenny's Podcast — together the most widely read and listened-to resources in product management and B2B/SaaS growth. A former product lead at Airbnb for seven years, Lenny left in 2019 and accidentally built the #1 business newsletter on Substack with 1M+ subscribers by publishing deeply researched, practitioner-level advice on product strategy, growth frameworks, career development, and startup building. His podcast features interviews with product leaders at Shopify, Duolingo, Linear, Notion, and hundreds of other high-growth companies. Lenny is an angel investor in Figma, Vanta, and Webflow. While technically product-focused, his content on positioning, growth loops, and go-to-market is essential reading for any marketer, founder, or operator serious about building.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://www.lennysnewsletter.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":213,"name":"Rose Han","handle":"@itsrosehan","category":"finance-personal","cats":null,"subcategory":null,"badge":"Finance (Personal)","featured":false,"color":"#3d1a2d","initials":"RH","followers":"1M+ YT · 149K IG","cred":"Former HSBC Wall Street FX Trader","extra":"Author: Add a Zero (Hay House, 2025)","summary":"Rose Han is a first-generation Korean-American financial educator, YouTuber, and author who turned $100,000 in student debt into a seven-figure investment portfolio in seven years — then left her HSBC Wall Street trading desk to teach others how to do the same. Her YouTube channel has grown to nearly 1 million subscribers where she covers index funds, options trading, Roth IRAs, and how to build wealth on a real income without waiting for a perfect situation. Known for blending emotional intelligence with practical money mechanics, Rose is the 'anti-guru' — a friend who figured it out and passes the playbook along. Her Hay House book Add a Zero (2025) distills her freedom-first financial framework for millennials. She's been profiled by the Wall Street Journal, Business Insider, and has partnered with NYSE and SoFi.","wiki":null,"yt":"https://www.youtube.com/@RoseHan","ig":"https://www.instagram.com/itsrosehan/","li":null,"tk":null,"web":"https://rosehan.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":214,"name":"Danielle Town","handle":"@danielletown","category":"finance-business","cats":null,"subcategory":null,"badge":"Finance (Business)","featured":false,"color":"#1a2d3d","initials":"DT","followers":"InvestED Podcast · Growing Following","cred":"Author: Invested (with Phil Town)","extra":"Value Investing for Busy Professionals","summary":"Danielle Town is the co-author of Invested: How Warren Buffett and Charlie Munger Taught Me to Master My Mind, My Emotions, and My Money and the co-host of the InvestED podcast alongside her father Phil Town (Rule #1 Investing). Her framework centers on Warren Buffett and Charlie Munger's approach to value investing — identifying wonderful companies at a fair price and holding them for the long term. What makes Danielle unique is her perspective as a formerly finance-avoidant attorney who learned to invest in real time: her content meets non-experts where they are, making deep fundamental analysis accessible to business owners, professionals, and anyone who wants to think like an owner. The InvestED podcast has produced 200+ episodes making it one of the deepest long-form investing education resources available.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://investedpodcast.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":215,"name":"Arie Scherson","handle":"@ariescherson","category":"ecommerce","cats":null,"subcategory":null,"badge":"eCommerce","featured":false,"color":"#1a3d2d","initials":"AS","followers":"120K+ YT","cred":"Founder of Blue Dot Holdings ($10M+ Revenue)","extra":"Dropshipping & eCom Holding Company Builder","summary":"Arie Scherson started his eCommerce journey in college with $0 and a YouTube video about print-on-demand, and went on to build Blue Dot Holdings — a portfolio of six eCommerce businesses generating over $10 million in combined revenue. His YouTube channel, which he has maintained consistently since 2012, has become one of the most trusted educational resources for Shopify dropshipping, Facebook Ads, and high-ticket product research — featuring real-world case studies rather than empty lifestyle flexing. Arie is also the founder of Akemi Lab, an eCommerce agency that generates the cash flow he uses to acquire and incubate new brands. His content and community are well-suited to operators who want actionable strategy on scaling a profitable eCom business rather than generic beginner tutorials.","wiki":null,"yt":"https://www.youtube.com/@aries1","ig":null,"li":null,"tk":null,"web":"https://ariescherson.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":216,"name":"Tan Choudhury","handle":"@tanchoudhury","category":"ecommerce","cats":null,"subcategory":null,"badge":"eCommerce","featured":false,"color":"#2d3d1a","initials":"TC","followers":"Growing TikTok & YouTube","cred":"Shopify DTC Brand Builder","extra":"One-Product Store & Dropshipping Expert","summary":"Tan Choudhury is a DTC eCommerce educator and practitioner known for his practical content on building one-product Shopify stores, sourcing winning products, and scaling with paid social. He is one of the more prominent voices in the Shopify and dropshipping educator space, particularly on TikTok, where he shares tactics for identifying trending products, building high-converting storefronts, and running Meta ad campaigns on lean budgets. His content is aimed at entrepreneurs who want to launch and grow an eCommerce business quickly without large upfront investment — making him especially relevant for first-time store owners, side hustlers, and founders looking to test product-market fit in digital retail.","wiki":null,"yt":"https://www.youtube.com/@TanChoudhury","ig":null,"li":null,"tk":null,"web":null,"bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":218,"name":"Cal Newport","handle":"@calnewport","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#1a2d4a","initials":"CN","followers":"500K+ YT · 3M+ Books Sold","cred":"Georgetown CS Professor","extra":"Deep Work Author","summary":"Cal Newport is the author of Deep Work, Digital Minimalism, and A World Without Email — the definitive academic voice on focused, distraction-free work. His concept of 'deep work' (cognitively demanding tasks performed without distraction) has reshaped how entrepreneurs, executives, and knowledge workers think about productivity. For small business owners drowning in email and shallow tasks, Newport's frameworks for time blocking, attention management, and digital minimalism provide the philosophical and practical foundation to reclaim hours of productive time daily.","wiki":"https://en.wikipedia.org/wiki/Cal_Newport","yt":"https://www.youtube.com/@CalNewportMedia","ig":null,"li":null,"tk":null,"web":"https://calnewport.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":219,"name":"David Allen","handle":"@gtdguru","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#0f3d2e","initials":"DA","followers":"200K+ YT","cred":"GTD Methodology Creator","extra":"Getting Things Done Author","summary":"David Allen created Getting Things Done (GTD) — the most widely adopted personal productivity system in the world. Used by executives, business owners, and knowledge workers across every industry, GTD provides a trusted external system for capturing tasks, projects, and commitments so your mind stays clear and focused. For home service, franchise, and trades business owners managing dozens of open loops simultaneously, GTD is the operating system that keeps everything from slipping through the cracks.","wiki":"https://en.wikipedia.org/wiki/David_Allen_(author)","yt":"https://www.youtube.com/@gettingthingsdone","ig":null,"li":null,"tk":null,"web":"https://gettingthingsdone.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":220,"name":"Francesco D'Alessio","handle":"@francescodal","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#3d1a60","initials":"FD","followers":"280K YT","cred":"Productivity Tool Reviewer","extra":"Keep Productive Founder","summary":"Francesco D'Alessio runs Keep Productive — the most comprehensive YouTube channel reviewing productivity apps, tools, and workflows. From Notion and Obsidian to ClickUp and Todoist, Francesco tests and compares every major productivity tool with unbiased, hands-on reviews. For small business owners evaluating which project management or task system to implement, Keep Productive saves dozens of hours of trial-and-error experimentation.","wiki":null,"yt":"https://www.youtube.com/@FrancescoDAlessio","ig":null,"li":null,"tk":null,"web":"https://keepproductive.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":221,"name":"Thomas Frank","handle":"@ThomasFrank","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#1a4d2a","initials":"TF","followers":"3.1M YT","cred":"Notion Expert & YouTuber","extra":"Notion Course Creator","summary":"Thomas Frank is one of YouTube's most-watched productivity educators, with over 3 million subscribers and a specialty in Notion — the all-in-one workspace tool used by millions of entrepreneurs and creators. His Notion tutorials cover everything from building a personal task manager to creating full business operating systems. His Notion Mastery course is the most highly reviewed Notion training available, and his free Notion templates have been downloaded millions of times.","wiki":null,"yt":"https://www.youtube.com/@ThomasFrank","ig":"https://www.instagram.com/tomfrankly/","li":null,"tk":null,"web":"https://thomasjfrank.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":222,"name":"Mike Vardy","handle":"@mikevardy","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#5c3a00","initials":"MV","followers":"75K YT","cred":"Productivityist Founder","extra":"Analog + Digital Systems","summary":"Mike Vardy is the Productivityist — a productivity strategist, author, and podcaster who focuses on intentional time design rather than mere efficiency. His approach bridges analog and digital workflows, helping business owners create sustainable productivity systems that align with their goals and energy levels rather than just optimizing for speed. His content is particularly valuable for entrepreneurs who feel busy but not productive.","wiki":null,"yt":"https://www.youtube.com/@mikevardy","ig":null,"li":null,"tk":null,"web":"https://productivityist.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":223,"name":"Laura Vanderkam","handle":"@lvanderkam","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#5c1a3a","initials":"LV","followers":"120K YT","cred":"Time Management Author","extra":"168 Hours Author","summary":"Laura Vanderkam i null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":240,"name":"Andrew Huberman","handle":"@hubermanlab","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#1a4d60","initials":"AH","followers":"6.2M YT","cred":"Stanford Neuroscientist","extra":"Huberman Lab Podcast","summary":"Andrew Huberman is a Stanford neuroscientist and professor whose Huberman Lab podcast has become one of the most-watched science channels on YouTube with 6.2M subscribers. While covering health broadly, his episodes on focus protocols, morning routines, NSDR (non-sleep deep rest), dopamine regulation, and sleep optimization are directly applicable to entrepreneurs wanting to maximize cognitive performance and sustained attention. His science-first approach gives business owners research-backed tools for managing energy and focus throughout the workday.","wiki":null,"yt":"https://www.youtube.com/@hubermanlab","ig":null,"li":null,"tk":null,"web":"https://hubermanlab.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":241,"name":"Mark Freeman","handle":"@everybodymindfulness","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#2a5c1a","initials":"MF","followers":"80K YT","cred":"Mindfulness & Focus Coach","extra":"Overthinking & Productivity","summary":"Mark Freeman specializes in mindfulness-based approaches to overcoming overthinking, perfectionism, and the mental blocks that keep entrepreneurs stuck and unproductive. His content on psychological flexibility, acceptance-based productivity, and building sustainable work habits provides the missing mental health layer that most productivity systems overlook. Particularly valuable for high-achieving business owners who struggle with anxiety-driven procrastination or perfectionism.","wiki":null,"yt":"https://www.youtube.com/@everybodymindfulness","ig":null,"li":null,"tk":null,"web":"https://ever e Expert","extra":"Field Guides Creator","summary":"David Sparks of MacSparky is the leading educator for Apple ecosystem automation and productivity, covering OmniFocus, Shortcuts, Keyboard Maestro, and the full Apple productivity stack. His Focused podcast (with Mike Schmitz) and Field Guides on automation have helped tens of thousands of entrepreneurs build automated workflows on Mac, iPhone, and iPad. For business owners who run on Apple devices, MacSparky provides the most comprehensive free and paid training on automation available.","wiki":null,"yt":"https://www.youtube.com/@macsparky","ig":null,"li":null,"tk":null,"web":"https://macsparky.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":251,"name":"Ev Chapman","handle":"@evchapman","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#5c1a3a","initials":"EC","followers":"75K newsletter","cred":"Atomic Ideas Creator","extra":"Content Repurposing Systems","summary":"Ev Chapman built her audience around 'Atomic Ideas' — a framework for breaking big concepts into small, shareable content pieces that compound across platforms. Her content production systems for solopreneurs and small business owners show how to produce weeks of content from a single piece of source material, eliminating the overwhelm of maintaining multiple social channels. Her approach combines productivity methodology with practical content marketing strategy.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://evchapman.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":253,"name":"Sam Julien","handle":"@samjulien","category":"productivity","cats":null,"subcategory":null,"badge":"Productivity","featured":false,"color":"#1a3d5c","initials":"SJ","followers":"50K YT","cred":"Developer Productivity Coach","extra":"Getting Unstuck Author","summary":"Sam Julien helps knowledge workers and entrepreneurs get unstuck essays — including 'Do Things That Don't Scale,' 'How to Get Startup Ideas,' and 'Ramen Profitable' — are required reading for every serious founder. His frameworks on finding good startup ideas, the importance of user obsession, and the counterintuitive nature of early-stage startup success have shaped how a generation of entrepreneurs think.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://paulgraham.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":256,"name":"Steve Blank","handle":"@sgblank","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3260","initials":"SB","followers":"100K+ readers","cred":"Lean Startup Originator","extra":"Customer Development Creator","summary":"Steve Blank created the Customer Development methodology — the foundation of the Lean Startup movement that Eric Ries later popularized. His concept of getting out of the building, talking to customers before building anything, and iterating based on real feedback has become the operating manual for modern startups. His book The Startup Owner's Manual is the most comprehensive guide to building a repeatable, scalable business from scratch.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://steveblank.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":257,"name":"Eric Ries","handle":"@ericries","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a4d3a","initials":"ER","followers":"300K+ readers","cred":"Lean Startup Author","extra":"Build-Measure-Learn Creator","summary":"Eric Ries wrote The Lean Startup — one of the most influential business books of the past 25 years and the framework that redefined how startups build products. His Build-Measure-Learn feedback loop, minimum viable product concept, and pivot-or-persevere decision framework give founders a systematic, scientific approach to reducing waste and finding product-market fit faster. Required reading for any founder building something new.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://theleanstartup.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":258,"name":"Hiten Shah","handle":"@hnshah","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#2a1a5c","initials":"HS","followers":"250K X followers","cred":"SaaS Founder & Advisor","extra":"Crazy Egg, KISSmetrics Co-Founder","summary":"Hiten Shah co-founded Crazy Egg and KISSmetrics and is one of the most respected SaaS startup advisors in Silicon Valley. His content on product-market fit, customer research, SaaS metrics, and building a startup culture is grounded in decades of practical experience. His Product Habits newsletter and podcast interviews are essential for founders building software products who want frameworks proven across hundreds of real companies.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://hitenshah.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":259,"name":"David Perell","handle":"@david_perell","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3260","initials":"DP","followers":"500K X followers","cred":"Write of Passage Founder","extra":"Online Writing Educator","summary":"David Perell runs Write of Passage — the most respected online writing course for entrepreneurs and founders who want to build a following and attract opportunities through content. His framework on Personal Monopoly, the idea of owning a unique intellectual niche at the intersection of your knowledge and interests, has helped thousands of entrepreneurs differentiate their personal brands. For startup founders, building an audience through writing is one of the most underrated distribution strategies available.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://perell.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":261,"name":"Andrew Chen","handle":"@andrewchen","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3d60","initials":"AC","followers":"300K X followers","cred":"a16z General Partner","extra":"Cold Start Problem Author","summary":"Andrew Chen is a General Partner at Andreessen Horowitz (a16z) and author of The Cold Start Problem — the definitive book on how network-effect businesses get started and scale. His essays on growth, user acquisition, retention, and the viral loops that power consumer startups are some of the most cited writing in the startup world. For founders building platforms, marketplaces, or any network-effect business, his frameworks are essential.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://andrewchen.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":264,"name":"Sahil Lavingia","handle":"@shl","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#3d1a60","initials":"SL","followers":"400K X followers","cred":"Gumroad Founder & CEO","extra":"The Minimalist Entrepreneur","summary":"Sahil Lavingia founded Gumroad — the creator economy platform — and wrote The Minimalist Entrepreneur, one of the most important books on building a profitable, sustainable business without venture capital. His journey from raising VC money, laying off most of his team, and rebuilding Gumroad as a lean, profitable company is one of the most instructive startup stories of the past decade. His content on building in public, embracing constraints, and defining success on your own terms resonates deeply with founders who want to build differently.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://sahillavingia.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":265,"name":"Indie Hackers (Courtland Allen)","handle":"@IndieHackers","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a4d3a","initials":"IH","followers":"600K+ community","cred":"Bootstrapped Startup Community","extra":"Acquired by Stripe","summary":"Indie Hackers is the largest community of bootstrapped and self-funded founders, featuring hundreds of in-depth interviews with founders who built profitable businesses without VC funding. Founded by Courtland Allen and acquired by Stripe, the platform documents the real revenue numbers, growth strategies, and lessons from founders across SaaS, content, e-commerce, and service businesses. For startup founders who want proven tactics from people who've actually done it, Indie Hackers is irreplaceable.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://indiehackers.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":266,"name":"Justin Jackson","handle":"@mijustin","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3260","initials":"JJ","followers":"80K+ readers","cred":"Transistor.fm Co-Founder","extra":"Bootstrapped SaaS Educator","summary":"Justin Jackson co-founded Transistor.fm (a podcast hosting platform) and has documented every step of building it from zero to $2M+ ARR in public. His content on finding a market before building a product, the importance of distribution, and the mental game of building a bootstrapped SaaS company is some of the most practical available. His Build Your SaaS podcast with Jon Buda is required listening for anyone building an independent software product.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://justinjackson.ca","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":267,"name":"Wes Kao","handle":"@wes_kao","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#5c1a3a","initials":"WK","followers":"300K X followers","cred":"Maven Co-Founder","extra":"Cohort-Based Course Pioneer","summary":"Wes Kao co-founded Maven — the leading platform for cohort-based courses — after helping build the altMBA with Seth Godin. Her writing on marketing strategy, course design, building in public, and the psychology of persuasion is among the sharpest tactical content for startup founders building education products or community businesses. Her newsletter on clear thinking and sharp communication is a must-follow for founders.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://weskao.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":268,"name":"Arvid Kahl","handle":"@arvidkahl","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#2a1a3d","initials":"AK","followers":"150K X followers","cred":"FeedbackPanda Founder","extra":"Zero to Sold Author","summary":"Arvid Kahl built FeedbackPanda — a SaaS tool for online English teachers — and sold it for life-changing money, then documented every detail in Zero to Sold, one of the most complete guides to building and selling a bootstrapped startup. His follow-up book The Embedded Entrepreneur covers how to build an audience-first startup by becoming an active member of the community you want to serve before building anything.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://thebootstrappedfounder.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":269,"name":"Jack Butcher","handle":"@jackbutcher","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a1a1a","initials":"JB","followers":"500K X followers","cred":"Visualize Value Founder","extra":"Creator Economy Pioneer","summary":"Jack Butcher built Visualize Value — a brand and business at the intersection of design and startup philosophy — entirely through Twitter/X, generating millions in revenue without a sales team or paid ads. His visual frameworks for thinking about leverage, value creation, and building a one-person media business have been shared millions of times. For startup founders thinking about personal brand and building in public as a distribution strategy, Butcher is the clearest thinker available.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://visualizevalue.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":270,"name":"Pieter Levels","handle":"@levelsio","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a4d60","initials":"PL","followers":"500K X followers","cred":"Serial Bootstrapped Founder","extra":"Nomad List & Remote OK","summary":"Pieter Levels (@levelsio) is the most famous bootstrapped indie hacker in the world — building Nomad List, Remote OK, and dozens of other profitable products solo with no employees, no VC money, and full transparency about his revenue ($3M+ ARR). His approach to building fast, shipping constantly, and letting the market tell you what to keep has inspired thousands of founders. His live revenue dashboards and real-time building in public on X make him the most transparent founder online.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://levels.io","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":271,"name":"April Dunford","handle":"@aprildunford","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#5c1a00","initials":"AD","followers":"200K X followers","cred":"Positioning Expert","extra":"Obviously Awesome Author","summary":"April Dunford literally wrote the book on startup positioning — Obviously Awesome is the definitive guide to finding and articulating your product's unique value in a crowded market. Used by startups from seed stage to post-IPO, her positioning methodology helps founders move away from feature comparisons to context-setting that makes a product's value immediately obvious to the right customer. For any startup struggling to explain what they do and why it matters, Dunford's work is transformative.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://aprildunford.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":272,"name":"Rob Walling","handle":"@robwalling","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a3d2a","initials":"RW","followers":"200K+ listeners","cred":"MicroConf Founder","extra":"TinySeed Accelerator","summary":"Rob Walling is the godfather of bootstrapped SaaS — co-founder of MicroConf (the largest conference for self-funded SaaS founders), founder of TinySeed (the first startup accelerator for bootstrappers), and host of the Startups for the Rest of Us podcast, with 700+ episodes. His framework on stair-stepping — starting with small products to build skills and cash flow before tackling a larger SaaS — is the most practical startup advice for non-VC-backed founders.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://robwalling.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":273,"name":"Lex Fridman","handle":"@lexfridman","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#1a1a1a","initials":"LF","followers":"4.2M YT","cred":"AI Researcher & Podcaster","extra":"MIT Researcher & Interviewer","summary":"Lex Fridman hosts one of the world's most-watched long-form n content on SaaS pricing, churn reduction, and subscription business strategy available. His research on willingness-to-pay, packaging, and the ROI of pricing optimization has helped thousands of SaaS founders capture more value from products they've already built.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://paddle.com/blog","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":276,"name":"Steli Efti","handle":"@steli","category":"entrepreneurship","cats":null,"subcategory":"🚀 Startup","badge":"Entrepreneurship","featured":false,"color":"#2a5c1a","initials":"SE","followers":"150K X followers","cred":"Close CRM Co-Founder","extra":"Startup Sales Expert","summary":"Steli Efti co-founded Close CRM and has built one of the most respected bodies of startup sales content in the world. His blog posts, podcasts, and courses on founder-led sales — how to close your first 10 customers, how to build a repeatable sales process, how to handle objections — are directly applicable to every early-stage startup that needs revenue before it can afford a sales team. His The Startup Chat podcast with Hiten Shah covers every aspect of building a startup with candor and practicality.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://close.com/blog","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":277,"name":"Brent Beshore","handle":"@BrentBeshore","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#1a3260","initials":"BB","followers":"200K X followers","cred":"Permanent Equity Founder","extra":"Long-Hold Acquirer","summary":"Brent Beshore founded Permanent Equity — one of the most respected small business holding companies in the US — with a permanent hold model that never forces exits. His writing on business buying, operator relationships, and what makes a great small business is some of the most thoughtful in the ETA space. His annual letters and essays on the Permanent Equity blog are required reading for any serious acquirer.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://permanentequity.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":280,"name":"Richard Parker","handle":"@richardparker","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#3d1a00","initials":"RP","followers":"100K+ readers","cred":"How to Buy a Good Business Author","extra":"Diomo Corporation Founder","summary":"Richard Parker has spent 30+ years in business acquisition and founded Diomo Corporation — one of the earliest and most comprehensive resources for small business buyers. His How to Buy a Good Business at a Great Price course and books have guided thousands of first-time buyers through the acquisition process. His practical, buyer-focused frameworks for finding, evaluating, and negotiating small business deals remain highly relevant.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://diomo.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":281,"name":"SMB Law Group","handle":"@smblawgroup","category":"eta","cats":null,"subcategory":null,"badge":"ETA / Buy a Biz","featured":false,"color":"#1a2d4a","initials":"SL","followers":"50K+ community","cred":"SMB Acquisition Legal Experts","extra":"M&A Attorneys for Searchers","summary":"SMB Law Group, co-founded by Sam Rosati, is the leading legal resource for small business acquirers — providing M&A attorneys who specialize in the specific legal needs of searchers buying businesses under $10M. Their educational content on LOIs, purchase agreements, asset vs. stock deals, and representation and warranty insurance fills a critical knowledge gap for first-time buyers navigating legal documents.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://smblawgroup.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"co isons, lease vs. buy decisions, and owner-operator finances. Their company pay database and driver reviews provide the most candid, crowd-sourced information available for drivers evaluating carriers and owner-operators benchmarking their compensation.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://thetruckersreport.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":512,"name":"3PL Central (Extensiv)","handle":"@3PLCentral","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a1a3a","initials":"3P","followers":"2K+ warehouses","cred":"3PL Warehouse Management Software","extra":"WMS for Third-Party Logistics","summary":"3PL Central (now Extensiv) is the leading warehouse management system for third-party logistics providers — helping 3PLs manage multi-client inventory, billing, receiving, and fulfillment operations. Their educational content on starting and scaling a 3PL business, managing client billing, and building a technology infrastructure for a fulfillment operation is invaluable for logistics entrepreneurs entering the warehousing and fulfillment space.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://extensiv.com/3plcentral","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":513,"name":"Supply Chain Now (Scott Luton)","handle":"@SupplyChainNow","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#0f3d2e","initials":"SC","followers":"200K listeners","cred":"Supply Chain Podcast & Media","extra":"Global Supply Chain Coverage","summary":"Supply Chain Now hosted by Scott Luton is one of the most widely downloaded supply chain podcasts — covering procurement, logistics, manufacturing, sustainability, and supply chain technology. Their interviews with supply chain executives and entrepreneurs provide a broad view of the industry, making it valuable for anyone operating in distribution, logistics, or manufacturing who wants to understand the full supply chain landscape.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://supplychainnow.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":514,"name":"Freight Broker Boot Camp (Dennis Brown)","handle":"@freightbrokerbootcamp","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3d60","initials":"DB","followers":"100K YT","cred":"Freight Broker Training","extra":"From Zero to Broker","summary":"Dennis Brown's Freight Broker Boot Camp is one of the most comprehensive training programs for people entering the freight brokerage industry — covering licensing (freight broker authority), building shipper relationships, carrier sourcing, TMS software, and scaling from solo broker to multi-agent brokerage. His YouTube channel provides extensive free education on the mechanics of starting a freight brokerage business.","wiki":null,"yt":"https://www.youtube.com/@freightbrokerbootcamp","ig":null,"li":null,"tk":null,"web":"https://freightbrokerbootcamp.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":515,"name":"Loadsmart","handle":"@Loadsmart","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#3d1a60","initials":"LS","followers":"5K+ shippers","cred":"Digital Freight Platform","extra":"AI-Powered Load Matching","summary":"Loadsmart is a digital freight brokerage using AI to match shippers with carriers for instant freight pricing and booking. Their educational content on digital freight procurement, shipper strategies for reducing transportation costs, and the future of AI in logistics is particularly relevant for distribution businesses looking to optimize their freight spend and carrier relationships.","wiki":null,"yt":null,"ig": ":"Culture & News in Logistics","summary":"Freight Caviar is the most culturally connected media brand in the trucking and freight industry — covering industry news, trends, and personalities through a lens that resonates with a younger generation of logistics professionals. Their Instagram-native content and industry commentary have made them one of the most followed logistics media brands, reaching both veterans and newcomers to the freight industry.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://freightcaviar.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":521,"name":"MoLo Solutions","handle":"@MoLoSolutions","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#0f3d2e","initials":"ML","followers":"3K+ carriers","cred":"Tech-Enabled Freight Brokerage","extra":"Carrier-First Brokerage Model","summary":"MoLo Solutions is a technology-enabled freight brokerage known for its carrier-first approach — building deep relationships with owner-operators and small carriers through better payment terms, technology tools, and communication. Their model represents the evolution of freight brokerage toward carrier experience as a competitive differentiator, providing a practical case study for anyone building in the freight brokerage space.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://molosolutions.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":522,"name":"Transportation Nation Network","handle":"@TransNationNet","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#1a3d5c","initials":"TN","followers":"50K community","cred":"Minority Trucking Community","extra":"Diversity in Logistics","summary":"Transportation Nation Network is the leading community and media platform focused on diversity and inclusion in the trucking and logi keting machine is invaluable for active investors.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://propstream.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":550,"name":"Mashvisor","handle":"@Mashvisor","category":"real-estate","cats":null,"subcategory":null,"badge":"Real Estate","featured":false,"color":"#1a3260","initials":"MV","followers":"50K+ users","cred":"Short-Term Rental Analytics","extra":"Airbnb Data & Market Analysis","summary":"Mashvisor is the leading analytics platform for short-term and long-term rental property analysis — providing Airbnb occupancy data, nightly rate projections, cash-on-cash return calculations, and neighborhood comparison tools for any market in the US. Their educational content on how to analyze an Airbnb market, compare STR vs. LTR returns, and find the best neighborhoods for rental properties is essential for any investor evaluating rental strategies.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://mashvisor.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":551,"name":"DSP Owners Community","handle":"@DSPOwners","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#f5a623","initials":"DO","followers":"25K+ members","cred":"Amazon DSP Business Education","extra":"Delivery Service Partner Network","summary":"DSP Owners Community is the most active peer network for Amazon Delivery Service Partners — covering route optimization, driver hiring and retention, van fleet management, Amazon scorecard metrics, and the financial realities of running a DSP business. Members share real P&L data, station-specific intel, and strategies for maintaining 'Fantastic' standing. Essential for anyone evaluating or currently operating an Amazon DSP business, where startup costs range from $30K–$100K and the business model depends entirely on hitting Amazon's performance benchmarks.","wiki":null,"yt":null,"ig":null,"li":null,"tk":null,"web":"https://dspowners.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":552,"name":"Last Mile Delivery Academy","handle":"@LastMileAcademy","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#e05d00","initials":"LM","followers":"80K YT","cred":"Last-Mile Delivery Business Education","extra":"Courier & Delivery Startup Guide","summary":"Last Mile Delivery Academy teaches entrepreneurs how to build courier and last-mile delivery businesses — covering how to win contracts with retailers, restaurants, and e-commerce brands, how to hire and manage drivers, vehicle selection, insurance requirements, and building delivery route density for profitability. Their content on the economics of last-mile delivery — cost per stop, fuel optimization, and territory building — is the most practical available for new delivery entrepreneurs.","wiki":null,"yt":"https://www.youtube.com/@LastMileDeliveryAcademy","ig":null,"li":null,"tk":null,"web":"https://lastmiledeliveryacademy.com","bookTitles":null,"bookUrls":null,"courseTitles":null,"courseUrls":null},{"id":553,"name":"Flex by Amazon (Driver Education)","handle":"@AmazonFlex","category":"transportation","cats":null,"subcategory":null,"badge":"Transportation & Logistics","featured":false,"color":"#232f3e","initials":"AF","followers":"500K+ drivers","cred":"Amazon Independent Contractor Delivery","extra":"Gig Delivery Income Resource","summary":"Amazon Flex is Amazon's independent contractor delivery program — allowing individuals to earn $18–$25/hour delivering packages in their own vehicle. The Flex driver community has produced an extensive body of knowledge on block snagging strategies, route efficiency, handling problem deliveries, and maximizing earnings as an independent delivery contractor. For entrepreneurs testing last-mile delivery economics before committing
